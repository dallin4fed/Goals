*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#ffffff;--bg2:#f5f5f5;--bg3:#ececec;--text:#111111;--text2:#555555;--text3:#888888;--border:#e0e0e0;--border2:#cccccc;--accent:#111111;--accent-fg:#ffffff;--info:#2563eb;--info-bg:#eff6ff;--success:#16a34a;--success-bg:#f0fdf4;--warning:#d97706;--warning-bg:#fffbeb;--danger:#dc2626;--danger-bg:#fef2f2;--radius:10px;--radius-sm:6px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}

label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;line-height:1.5;}
#pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem 1rem;text-align:center;}
.pin-logo{font-size:48px;margin-bottom:1rem;}.pin-title{font-size:26px;font-weight:600;margin-bottom:6px;}.pin-sub{font-size:14px;color:var(--text2);margin-bottom:2rem;}
.pin-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;width:100%;max-width:340px;}
.pin-input{font-size:28px;letter-spacing:10px;text-align:center;font-weight:600;padding:12px;}
.pin-hint{font-size:12px;color:var(--text3);margin-top:8px;line-height:1.5;}.pin-error{font-size:13px;color:var(--danger);margin-top:8px;min-height:20px;line-height:1.5;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;border:none;line-height:1.5;transition:opacity 0.15s,background 0.15s;}

.btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border2);}.btn-secondary:hover{background:var(--bg2);opacity:1;}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger);}.btn-danger:hover{background:var(--danger-bg);opacity:1;}
.btn-warning{background:transparent;color:var(--warning);border:1px solid var(--warning);}.btn-warning:hover{background:var(--warning-bg);opacity:1;}
.btn-ghost{background:transparent;border:none;color:var(--danger);padding:4px 8px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;}.btn-ghost:hover{background:var(--danger-bg);}
.btn-add-reminder{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--info);background:none;border:1px dashed var(--info);border-radius:var(--radius-sm);padding:6px 12px;cursor:pointer;margin-top:4px;}.btn-add-reminder:hover{background:var(--info-bg);}
.btn-full{width:100%;justify-content:center;padding:12px;font-size:15px;}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);display:flex;z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 10px;cursor:pointer;color:var(--text3);font-size:10px;gap:3px;border:none;background:none;font-family:var(--font);transition:color 0.15s;line-height:1.4;}
.nav-item i{font-size:22px;}.nav-item span{font-size:10px;line-height:1.4;padding-bottom:1px;}.nav-item.active{color:var(--accent);}
.freq-tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap;}
.ftab{padding:5px 12px;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);line-height:1.5;}

.card-meta{display:flex;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap;}
.badges{display:flex;gap:5px;flex-wrap:wrap;align-items:center;flex-shrink:0;}
.badge{font-size:11px;padding:3px 8px;border-radius:99px;font-weight:500;line-height:1.5;display:inline-block;}
.badge-physical{background:var(--info-bg);color:var(--info);}.badge-character{background:var(--success-bg);color:var(--success);}
.badge-freq{background:var(--bg2);color:var(--text2);border:1px solid var(--border);}.badge-done{background:var(--success-bg);color:var(--success);}
.meta-tag{font-size:11px;color:var(--text3);background:var(--bg2);padding:3px 8px;border-radius:99px;line-height:1.5;border:1px solid var(--border);}
.rem-tag{font-size:11px;color:var(--warning);background:var(--warning-bg);padding:3px 8px;border-radius:99px;display:inline-flex;align-items:center;gap:3px;line-height:1.5;}
.streak-tag{font-size:11px;color:var(--danger);background:var(--danger-bg);padding:3px 8px;border-radius:99px;display:inline-flex;align-items:center;gap:3px;line-height:1.5;}
.progress-wrap{margin-top:6px;}.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:4px;line-height:1.6;padding-bottom:2px;}
.progress-track{background:var(--bg3);border-radius:99px;height:8px;overflow:hidden;}
.progress-fill{height:8px;border-radius:99px;background:var(--accent);transition:width 0.4s;}.progress-fill.done{background:var(--success);}
.week-checklist{margin:10px 0;}.week-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.week-lbl{font-size:13px;font-weight:500;line-height:1.5;}.week-nav{display:flex;gap:4px;}
.week-nav button{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);width:32px;height:32px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--text2);}
.week-nav button:hover{background:var(--bg2);}
.week-days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.day-cell{display:flex;flex-direction:column;align-items:center;gap:4px;}
.day-name{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.04em;line-height:1.5;}
.day-num{font-size:11px;color:var(--text2);line-height:1.5;}
.day-btn{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;line-height:1;}
.day-btn:hover:not(:disabled){border-color:var(--accent);background:var(--bg2);}

.day-btn.is-today{border-color:var(--info);}.day-btn:disabled{opacity:0.3;cursor:not-allowed;}
.week-summary{font-size:12px;color:var(--text2);margin-top:8px;line-height:1.6;}
.mini-checklist{margin-top:8px;}.mini-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px;}
.mini-label{font-size:9px;color:var(--text3);text-align:center;line-height:1.5;}
.mini-cells{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}

.big-track{background:var(--bg3);border-radius:99px;height:12px;overflow:hidden;}

.addition-date{font-size:11px;color:var(--text3);white-space:nowrap;line-height:1.6;}
.summary-row{padding:9px 0;border-bottom:1px solid var(--border);}.summary-row:last-child{border-bottom:none;}
.summary-date{font-size:11px;color:var(--text3);margin-bottom:3px;line-height:1.6;}
.summary-text{font-size:14px;line-height:1.7;padding-bottom:2px;}
.detail-actions{display:flex;gap:8px;margin-top:1.5rem;flex-wrap:wrap;}
.streak-box{background:var(--danger-bg);border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:1rem;}
.streak-num{font-size:34px;font-weight:800;color:var(--danger);line-height:1;}
.streak-lbl{font-size:14px;font-weight:600;line-height:1.5;}.streak-sub{font-size:12px;color:var(--text2);line-height:1.5;}
.done-banner{background:var(--success-bg);border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:1rem;}
.done-banner-text{font-size:13px;color:var(--success);line-height:1.5;}.done-banner-text strong{display:block;font-size:14px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem;}
.stat-card{background:var(--bg2);border-radius:var(--radius);padding:1rem;border:1px solid var(--border);}
.stat-num{font-size:28px;font-weight:700;line-height:1.2;padding-bottom:2px;}.stat-lbl{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5;}

.rem-block-lbl{font-size:12px;font-weight:600;color:var(--text2);line-height:1.5;}

.reward-btn.no{background:var(--danger-bg);border:2px solid var(--danger);}

@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-16px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
</style>

const ICON_MAP={financial:'­¤Æ░',travel:'Ō£ł’ĖÅ',fitness:'­¤Æ¬',health:'ŌØż’ĖÅ',academic:'­¤ōÜ',career:'­¤Æ╝',social:'­¤żØ',spiritual:'­¤ÖÅ',intellectual:'­¤¦Ā',emotional:'­¤ī▒',creative:'­¤Ä©',relational:'­¤Æø',savings:'­¤Æ░',money:'­¤Æ░',sweden:'­¤ćĖ­¤ć¬',running:'­¤Åā',workout:'­¤Æ¬',read:'­¤ō¢',serve:'­¤ż▓',others:'­¤ż▓',kindness:'­¤Æø',prayer:'­¤ÖÅ',meditat:'­¤¦ś',journal:'­¤ōō',weight:'ŌÜ¢’ĖÅ',water:'­¤Æ¦',sleep:'­¤ś┤',diet:'­¤źŚ',cook:'­¤Ź│',music:'­¤ÄĄ',learn:'­¤ōÜ',study:'­¤ō¢',code:'­¤Æ╗',write:'Ō£Ź’ĖÅ',draw:'­¤Ä©',walk:'­¤ÜČ',bike:'­¤Ü▓',swim:'­¤ÅŖ',default:'­¤Ä»'};

async function sbFetch(path,opts={}){const res=await fetch(SUPABASE_URL+path,{...opts,headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})}});if(!res.ok){const e=await res.text();throw new Error(e);}const t=await res.text();return t?JSON.parse(t):null;}
async function loadFromSupabase(){try{const rows=await sbFetch('/rest/v1/goals?pin=eq.'+userPin+'&order=created_at.asc');goals=(rows||[]).map(r=>({...r.data,id:r.id,_dbid:r.id}));supabaseReady=true;}catch(e){console.warn('Supabase failed:',e.message);loadFromLocal();}}
async function saveGoal(g){if(supabaseReady){try{if(g._dbid){await sbFetch('/rest/v1/goals?id=eq.'+g._dbid,{method:'PATCH',body:JSON.stringify({pin:userPin,data:g})});}else{const rows=await sbFetch('/rest/v1/goals',{method:'POST',body:JSON.stringify({pin:userPin,data:g})});if(rows&&rows[0])g._dbid=rows[0].id;}}catch(e){console.warn('Save failed:',e.message);}}saveAllLocal();}
async function deleteGoalFromDB(g){if(supabaseReady&&g._dbid){try{await sbFetch('/rest/v1/goals?id=eq.'+g._dbid,{method:'DELETE'});}catch(e){}}saveAllLocal();}
function saveAllLocal(){try{localStorage.setItem('goals_'+userPin,JSON.stringify(goals));}catch(e){}}
function loadFromLocal(){try{const r=localStorage.getItem('goals_'+userPin);if(r)goals=JSON.parse(r);}catch(e){goals=[];}}

document.getElementById('pin-input').addEventListener('keydown',e=>{if(e.key==='Enter')submitPin();});
async function submitPin(){const val=document.getElementById('pin-input').value.trim();if(val.length<4||val.length>8||!/^\d+$/.test(val)){document.getElementById('pin-error').textContent='PIN must be 4ŌĆō8 digits.';return;}document.getElementById('pin-error').textContent='';userPin=val;document.getElementById('pin-screen').style.display='none';document.getElementById('app').style.display='block';document.getElementById('pin-display').textContent='PIN: '+'ŌĆó'.repeat(val.length);await loadFromSupabase();checkReminders();render();}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function today(){return new Date().toISOString().slice(0,10);}
function todayDOW(){return new Date().getDay();}
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtUnit(g,val){const u=g.unit||'dollars ($)';if(u==='dollars ($)')return '$'+Number(val).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});const l=u==='Custom'?(g.customUnit||''):u;return Number(val).toLocaleString('en-US',{maximumFractionDigits:2})+(l?' '+l:'');}
function fmtSubcat(g){return(g.subcat||'').startsWith('Other')?(g.customSubcat||'Other'):(g.subcat||'');}
function fmtRemTime(r){return(r.time||'')+' '+(r.ampm||'AM');}
function pickIcon(t,s,p){const txt=(t+' '+s+' '+p).toLowerCase();for(const[k,v]of Object.entries(ICON_MAP)){if(txt.includes(k))return v;}return '­¤Ä»';}
async function fetchAIIcon(title,subcat,purpose){try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:20,messages:[{role:'user',content:'Reply with a single emoji only that best represents this goal.\nTitle: '+title+'\nSubcategory: '+subcat+'\nPurpose: '+purpose}]})});const d=await res.json();const t=d.content?.[0]?.text?.trim();if(t&&[...t].length<=2)return t;}catch(e){}return pickIcon(title,subcat,purpose);}
function getWeekDates(offset=0){const d=new Date();d.setDate(d.getDate()-d.getDay()+offset*7);return Array.from({length:7},(_,i)=>{const dd=new Date(d);dd.setDate(d.getDate()+i);return dd.toISOString().slice(0,10);});}
function weekLabel(dates){const s=new Date(dates[0]+'T12:00:00'),e=new Date(dates[6]+'T12:00:00');return s.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' ŌĆō '+e.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function updateStreak(g){const t=today();if(g.lastCheckin===t)return;const yest=new Date();yest.setDate(yest.getDate()-1);const y=yest.toISOString().slice(0,10);g.streak=(g.lastCheckin===y||!g.lastCheckin)?(g.streak||0)+1:1;g.lastCheckin=t;}

function checkReminders(){const now=new Date(),h12=now.getHours()%12||12,ampm=now.getHours()<12?'AM':'PM',nowStr=h12+':'+now.getMinutes().toString().padStart(2,'0')+' '+ampm;goals.filter(g=>!g.completed&&!g.archived).forEach(g=>{(g.reminders||[]).forEach(r=>{if((r.time||'').trim()+' '+(r.ampm||'AM')===nowStr)showNotif('­¤öö '+g.icon+' '+g.title);});});setTimeout(checkReminders,60000);}
function showNotif(msg){const el=document.createElement('div');el.className='notif-banner';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),5000);}

function setView(v,el){currentView=v;document.querySelectorAll('.nav-item').forEach(t=>t.classList.remove('active'));if(el)el.classList.add('active');document.getElementById('freq-row').style.display=['all','physical','character'].includes(v)?'flex':'none';document.getElementById('detail-view').style.display='none';document.getElementById('main-view').style.display='block';render();}
function setFreq(f,el){currentFreq=f;document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));el.classList.add('active');render();}
function isToday(g){if(g.frequency==='weekly'){const d=g.reminderDays||[];return d.length===0||d.includes(todayDOW());}return true;}

function render(){
  const area=document.getElementById('goals-area');
  if(currentView==='dashboard'){renderDashboard(area);return;}
  if(currentView==='archive'){renderArchive(area);return;}
  if(currentView==='stats'){renderStats(area);return;}
  let list=goals.filter(g=>!g.archived&&!g.completed);
  if(currentView==='physical')list=list.filter(g=>g.type==='physical');
  else if(currentView==='character')list=list.filter(g=>g.type==='character');
  if(currentFreq!=='all')list=list.filter(g=>g.frequency===currentFreq);
  area.innerHTML=list.length?'<div class="goals-grid">'+list.map(goalCard).join('')+'</div>':'<div class="empty-state"><span class="empty-icon">­¤Ä»</span>No goals here yet.</div>';
}
function renderDashboard(area){
  if(!goals.length){area.innerHTML='<div class="empty-state"><span class="empty-icon">­¤Ä»</span>No goals yet ŌĆö hit "New goal" to start!</div>';return;}
  const active=goals.filter(g=>!g.archived&&!g.completed),tg=active.filter(isToday);
  function sec(lbl,ico,list){if(!list.length)return '';return '<div style="margin-bottom:1.5rem;"><div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px;"><i class="ti '+ico+'" style="font-size:14px;"></i>'+lbl+'</div><div class="goals-grid">'+list.map(goalCard).join('')+'</div></div>';}
  let html='<div style="font-size:13px;color:var(--text2);margin-bottom:1rem;line-height:1.6;">'+DOW_FULL[todayDOW()]+"'s goals</div>";
  html+=sec('Daily','ti-sun',tg.filter(g=>g.frequency==='daily'));
  html+=sec('This week','ti-calendar-week',tg.filter(g=>g.frequency==='weekly'));
  html+=sec('Long-term','ti-flag',tg.filter(g=>g.frequency==='longterm'));
  html+=sec('General','ti-circle-dot',tg.filter(g=>!g.frequency));
  if(!tg.length)html+='<div class="empty-state"><span class="empty-icon">ŌśĆ’ĖÅ</span>No goals scheduled for today.</div>';
  area.innerHTML=html;
}
function renderArchive(area){
  const arch=goals.filter(g=>g.archived||g.completed);
  if(!arch.length){area.innerHTML='<div class="empty-state"><span class="empty-icon">­¤Åå</span>No completed goals yet ŌĆö keep going!</div>';return;}
  area.innerHTML='<div style="font-size:13px;color:var(--text2);margin-bottom:1rem;">Completed goals</div><div class="goals-grid">'+arch.map(goalCard).join('')+'</div>';
}
function renderStats(area){
  const active=goals.filter(g=>!g.archived&&!g.completed),completed=goals.filter(g=>g.completed||g.archived);
  const longestStreak=goals.reduce((m,g)=>Math.max(m,g.streak||0),0);
  const totalCheckins=goals.reduce((s,g)=>s+Object.keys(g.checkins||{}).length,0);
  const totalSaved=goals.filter(g=>g.type==='physical'&&g.unit==='dollars ($)').reduce((s,g)=>s+(g.current||0),0);
  const totalAdditions=goals.reduce((s,g)=>s+(g.additions||[]).length,0);
  const totalSummaries=goals.reduce((s,g)=>s+(g.entries||[]).length,0);
  area.innerHTML='<div style="font-size:13px;color:var(--text2);margin-bottom:1rem;line-height:1.6;">Your progress at a glance</div><div class="stats-grid"><div class="stat-card"><div class="stat-num">'+active.length+'</div><div class="stat-lbl">Active goals</div></div><div class="stat-card"><div class="stat-num">'+completed.length+'</div><div class="stat-lbl">Goals completed</div></div><div class="stat-card"><div class="stat-num">­¤öź '+longestStreak+'</div><div class="stat-lbl">Longest streak (days)</div></div><div class="stat-card"><div class="stat-num">'+totalCheckins+'</div><div class="stat-lbl">Total days checked in</div></div><div class="stat-card"><div class="stat-num">$'+totalSaved.toLocaleString('en-US',{maximumFractionDigits:0})+'</div><div class="stat-lbl">Total $ saved</div></div><div class="stat-card"><div class="stat-num">'+totalAdditions+'</div><div class="stat-lbl">Additions logged</div></div><div class="stat-card"><div class="stat-num">'+totalSummaries+'</div><div class="stat-lbl">Summaries written</div></div><div class="stat-card"><div class="stat-num">'+goals.length+'</div><div class="stat-lbl">Total goals ever</div></div></div>';
}

function goalCard(g){
  const done=g.completed||g.archived,tm=g.trackingMode||'progress';
  const pct=g.type==='physical'&&g.target?Math.min(100,Math.round((g.current/g.target)*100)):(g.type==='character'&&g.charTarget&&g.entries?Math.min(100,Math.round((g.entries.length/g.charTarget)*100)):0);
  let track='';
  if(tm==='checklist'&&!done){const dates=getWeekDates(0),t=today();const cells=dates.map(d=>{const ck=g.checkins&&g.checkins[d],isTod=d===t;return '<div class="mini-cell'+(ck?' checked':'')+(isTod?' is-today':'')+'">'+( ck?'Ō£ō':'')+'</div>';}).join('');const labels=DOW_SHORT.map(d=>'<div class="mini-label">'+d+'</div>').join('');const cnt=dates.filter(d=>g.checkins&&g.checkins[d]&&d<=t).length,tot=dates.filter(d=>d<=t).length;track='<div class="mini-checklist"><div class="mini-labels">'+labels+'</div><div class="mini-cells">'+cells+'</div><div class="mini-count">'+cnt+'/'+tot+' this week</div></div>';}
  else if(g.type==='physical'){if(g.showProgress&&g.target)track='<div class="progress-wrap"><div class="progress-label"><span>'+fmtUnit(g,g.current)+' / '+fmtUnit(g,g.target)+'</span><span>'+pct+'%</span></div><div class="progress-track"><div class="progress-fill'+(done?' done':'')+'" style="width:'+pct+'%"></div></div></div>';else track='<div style="font-size:12px;color:var(--text3);margin-top:6px;line-height:1.6;padding-bottom:2px;">'+fmtUnit(g,g.current)+' of '+fmtUnit(g,g.target)+'</div>';}
  else{if(g.showProgress&&g.charTarget)track='<div class="progress-wrap"><div class="progress-label"><span>'+(g.entries?g.entries.length:0)+'/'+g.charTarget+' entries</span><span>'+pct+'%</span></div><div class="progress-track"><div class="progress-fill'+(done?' done':'')+'" style="width:'+pct+'%"></div></div></div>';else track='<div style="font-size:12px;color:var(--text3);margin-top:6px;line-height:1.6;padding-bottom:2px;">'+(g.entries?g.entries.length:0)+' summar'+( g.entries&&g.entries.length===1?'y':'ies')+' logged</div>';}
  const rems=(g.reminders||[]).map(r=>'<span class="rem-tag"><i class="ti ti-bell" style="font-size:10px;"></i> '+fmtRemTime(r)+'</span>').join('');
  const freqBadge=g.frequency?'<span class="badge badge-freq">'+(g.frequency==='longterm'?'long-term':g.frequency)+'</span>':'';
  const doneBadge=done?'<span class="badge badge-done">Ō£ō done</span>':'';
  const dueBadge=g.frequency==='longterm'&&g.goalDate?'<span class="meta-tag"><i class="ti ti-calendar" style="font-size:10px;"></i> '+fmtDate(g.goalDate)+'</span>':'';
  const streakTag=g.streak>1&&!done?'<span class="streak-tag">­¤öź '+g.streak+' day streak</span>':'';
  return '<div class="goal-card'+(done?' done-card':'')+'" onclick="openDetail(\''+g.id+'\')"><div class="card-top"><div class="card-title-row"><span class="card-icon">'+(g.icon||'­¤Ä»')+'</span><span class="card-title">'+g.title+'</span></div><div class="badges"><span class="badge badge-'+g.type+'">'+g.type+'</span>'+freqBadge+doneBadge+'</div></div><div class="card-purpose">'+g.purpose+'</div>'+track+'<div class="card-meta"><span class="meta-tag">'+fmtSubcat(g)+'</span>'+dueBadge+streakTag+rems+'</div></div>';
}

function openDetail(id){const g=goals.find(x=>x.id===id);if(!g)return;if(detailWeekOffset[id]===undefined)detailWeekOffset[id]=0;document.getElementById('main-view').style.display='none';document.getElementById('detail-view').style.display='block';renderDetailView(id);}

function renderDetailView(id){
  const g=goals.find(x=>x.id===id);if(!g)return;
  const dv=document.getElementById('detail-view');dv.innerHTML='';
  const done=g.completed||g.archived,tm=g.trackingMode||'progress',offset=detailWeekOffset[id]||0;
  const pct=g.type==='physical'&&g.target?Math.min(100,Math.round((g.current/g.target)*100)):0;
  let trackSection='';
  if(tm==='checklist'&&!done){trackSection=renderChecklistDetail(g,offset);}
  else if(g.type==='physical'){
    const barHTML=g.showProgress&&g.target?'<div class="big-track"><div class="big-fill'+(done?' done':'')+'" style="width:'+pct+'%"></div></div><div class="pct-lbl">'+pct+'% complete ┬Ę '+fmtUnit(g,g.current)+' of '+fmtUnit(g,g.target)+'</div>':'<div style="font-size:13px;color:var(--text2);line-height:1.6;">'+fmtUnit(g,g.current)+' of '+fmtUnit(g,g.target)+'</div>';
    trackSection='<div class="big-progress"><div class="big-amounts"><div><div class="big-amount-label">Progress</div><div class="big-amount">'+fmtUnit(g,g.current)+'</div></div><div style="text-align:right"><div class="big-amount-label">Target</div><div class="big-amount">'+fmtUnit(g,g.target)+'</div></div></div>'+barHTML+'</div>'+((!done)?'<button class="btn btn-secondary" onclick="openAddAmount(\''+g.id+'\')"><i class="ti ti-plus"></i> Log addition</button>':'')+'<div class="section-lbl">Additions</div>'+renderAdditions(g);
  } else {
    const cpct=g.showProgress&&g.charTarget&&g.entries?Math.min(100,Math.round((g.entries.length/g.charTarget)*100)):0;
    const charBar=g.showProgress&&g.charTarget?'<div class="big-progress" style="margin-top:1rem;"><div class="big-amounts"><div><div class="big-amount-label">Entries</div><div class="big-amount">'+(g.entries?g.entries.length:0)+'</div></div><div style="text-align:right"><div class="big-amount-label">Goal</div><div class="big-amount">'+g.charTarget+'</div></div></div><div class="big-track"><div class="big-fill'+(done?' done':'')+'" style="width:'+cpct+'%"></div></div><div class="pct-lbl">'+cpct+'% ┬Ę '+(g.entries?g.entries.length:0)+' of '+g.charTarget+' entries</div></div>':'';
    trackSection=charBar+((!done)?'<button class="btn btn-secondary" onclick="openAddSummary(\''+g.id+'\')"><i class="ti ti-pencil"></i> Add today\'s summary</button>':'')+'<div class="section-lbl">Daily summaries</div>'+renderSummaries(g);
  }
  const rems=g.reminders||[];
  const remHTML=rems.length?rems.map(r=>{let d=fmtRemTime(r);if(r.repeat&&r.repeat!=='Never'){d+=' ┬Ę repeats '+r.repeat;if(r.endDate)d+=' until '+fmtDate(r.endDate);}return '<div style="font-size:12px;color:var(--warning);display:flex;align-items:center;gap:4px;margin-bottom:4px;line-height:1.6;"><i class="ti ti-bell" style="font-size:13px;"></i>'+d+'</div>';}).join(''):'';
  const streakHTML=g.streak>0&&!done?'<div class="streak-box"><div class="streak-num">'+g.streak+'</div><div><div class="streak-lbl">Day streak ­¤öź</div><div class="streak-sub">Keep it going!</div></div></div>':'';
  const doneBanner=done?'<div class="done-banner"><span style="font-size:22px;">­¤Äē</span><div class="done-banner-text"><strong>Goal finished!</strong>'+(g.completedAt?' Finished '+fmtDate(g.completedAt):'')+'</div></div>':'';
  let actions='';
  if(done){actions='<button class="btn btn-primary" onclick="repeatGoal(\''+g.id+'\')"><i class="ti ti-refresh"></i> Repeat this goal</button><button class="btn btn-warning" onclick="confirmUnfinish(\''+g.id+'\')"><i class="ti ti-arrow-back"></i> Un-finish</button><button class="btn btn-danger" onclick="confirmDeleteGoal(\''+g.id+'\')"><i class="ti ti-trash"></i> Delete</button>';}
  else{actions='<button class="btn btn-success" onclick="confirmFinishGoal(\''+g.id+'\')"><i class="ti ti-flag"></i> Finish goal</button><button class="btn btn-secondary" onclick="openEditGoal(\''+g.id+'\')"><i class="ti ti-edit"></i> Edit</button><button class="btn btn-danger" onclick="confirmDeleteGoal(\''+g.id+'\')"><i class="ti ti-trash"></i> Delete</button>';}
  dv.innerHTML='<div style="max-width:640px;margin:0 auto;padding:1.5rem 1rem 5rem;"><button class="back-btn" onclick="closeDetail()"><i class="ti ti-arrow-left"></i> Back</button>'+doneBanner+'<span class="detail-icon">'+(g.icon||'­¤Ä»')+'</span><div class="badges" style="margin-bottom:8px;"><span class="badge badge-'+g.type+'">'+g.type+'</span>'+(g.frequency?'<span class="badge badge-freq">'+(g.frequency==='longterm'?'long-term':g.frequency)+'</span>':'')+'<span class="meta-tag">'+fmtSubcat(g)+'</span></div><div class="detail-title">'+g.title+'</div>'+(g.frequency==='longterm'&&g.goalDate?'<div style="font-size:12px;color:var(--text3);margin-bottom:6px;line-height:1.6;"><i class="ti ti-calendar"></i> Goal date: '+fmtDate(g.goalDate)+'</div>':'')+'<div class="detail-purpose">'+g.purpose+'</div>'+remHTML+streakHTML+trackSection+'<div class="detail-actions">'+actions+'</div></div>';
}

function renderChecklistDetail(g,offset){
  const dates=getWeekDates(offset),t=today();
  const lbl=offset===0?'This week':offset===-1?'Last week':weekLabel(dates);
  const done=dates.filter(d=>g.checkins&&g.checkins[d]).length,possible=dates.filter(d=>d<=t).length;
  const cells=dates.map(d=>{const ck=g.checkins&&g.checkins[d],isTod=d===t,isFut=d>t,dayNum=new Date(d+'T12:00:00').getDate();return '<div class="day-cell"><div class="day-name">'+DOW_SHORT[new Date(d+'T12:00:00').getDay()]+'</div><div class="day-num">'+dayNum+'</div><button class="day-btn'+(ck?' checked':'')+(isTod?' is-today':'')+'" onclick="'+(isFut?'':'event.stopPropagation();toggleCheckin(\''+g.id+'\',\''+d+'\');')+'" '+(isFut?'disabled':'')+'>'+( ck?'Ō£ō':'')+'</button></div>';}).join('');
  return '<div class="week-checklist"><div class="week-hdr"><span class="week-lbl">'+lbl+'</span><div class="week-nav"><button onclick="changeWeek(\''+g.id+'\',-1)" title="Prev week"><i class="ti ti-chevron-left"></i></button>'+(offset<0?'<button onclick="changeWeek(\''+g.id+'\',1)" title="Next week"><i class="ti ti-chevron-right"></i></button>':'<span style="width:32px;display:inline-block;"></span>')+'</div></div><div class="week-days">'+cells+'</div><div class="week-summary">'+done+' of '+possible+' day'+(possible!==1?'s':'')+' checked off'+(offset===0?' this week':'')+'</div></div>';
}
function changeWeek(id,delta){if(detailWeekOffset[id]===undefined)detailWeekOffset[id]=0;detailWeekOffset[id]+=delta;renderDetailView(id);}
function toggleCheckin(goalId,dateStr){const g=goals.find(x=>x.id===goalId);if(!g)return;if(!g.checkins)g.checkins={};if(g.checkins[dateStr])delete g.checkins[dateStr];else{g.checkins[dateStr]=true;updateStreak(g);}saveGoal(g);renderDetailView(goalId);}
function renderAdditions(g){if(!g.additions||!g.additions.length)return '<div style="font-size:13px;color:var(--text3);padding:6px 0;line-height:1.6;">No additions yet.</div>';return [...g.additions].reverse().map(a=>'<div class="addition-row"><div><div class="addition-amt">+'+fmtUnit(g,a.amount)+'</div><div class="addition-cap">'+a.caption+'</div></div><div class="addition-date">'+fmtDate(a.date)+'</div></div>').join('');}
function renderSummaries(g){if(!g.entries||!g.entries.length)return '<div style="font-size:13px;color:var(--text3);padding:6px 0;line-height:1.6;">No summaries yet.</div>';return [...g.entries].reverse().map(e=>'<div class="summary-row"><div class="summary-date">'+fmtDate(e.date)+'</div><div class="summary-text">'+e.text+'</div></div>').join('');}
function closeDetail(){document.getElementById('detail-view').style.display='none';document.getElementById('main-view').style.display='block';render();}

function confirmFinishGoal(id){const g=goals.find(x=>x.id===id);if(!g)return;showModal('<div class="confirm-box"><span class="confirm-icon">­¤Åü</span><div class="confirm-title">Finish this goal?</div><div class="confirm-sub">This will move "'+g.title+'" to your archive. You can un-finish it later if needed.</div><div class="confirm-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-success" onclick="finishGoal(\''+id+'\')"><i class="ti ti-flag"></i> Yes, finish it!</button></div></div>');}
function finishGoal(id){const g=goals.find(x=>x.id===id);if(!g)return;g.completed=true;g.archived=true;g.completedAt=today();saveGoal(g);closeModal();renderDetailView(id);}
function confirmUnfinish(id){const g=goals.find(x=>x.id===id);if(!g)return;showModal('<div class="confirm-box"><span class="confirm-icon">­¤öä</span><div class="confirm-title">Un-finish this goal?</div><div class="confirm-sub">This will move "'+g.title+'" back to your active goals.</div><div class="confirm-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-warning" onclick="unfinishGoal(\''+id+'\')"><i class="ti ti-arrow-back"></i> Yes, un-finish</button></div></div>');}
function unfinishGoal(id){const g=goals.find(x=>x.id===id);if(!g)return;g.completed=false;g.archived=false;g.completedAt=null;saveGoal(g);closeModal();setView('dashboard',document.getElementById('nav-dashboard'));}
function confirmDeleteGoal(id){const g=goals.find(x=>x.id===id);if(!g)return;showModal('<div class="confirm-box"><span class="confirm-icon">­¤Śæ’ĖÅ</span><div class="confirm-title">Delete this goal?</div><div class="confirm-sub">Are you sure you want to permanently delete "'+g.title+'"? This cannot be undone.</div><div class="confirm-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="doDeleteGoal(\''+id+'\')"><i class="ti ti-trash"></i> Yes, delete it</button></div></div>');}
async function doDeleteGoal(id){const g=goals.find(x=>x.id===id);goals=goals.filter(x=>x.id!==id);await deleteGoalFromDB(g);closeModal();closeDetail();}
function repeatGoal(id){const g=goals.find(x=>x.id===id);if(!g)return;const t={...g,id:uid(),_dbid:null,completed:false,archived:false,completedAt:null,streak:0,lastCheckin:null,current:0,additions:[],entries:[],checkins:{}};goals.push(t);formReminders=t.reminders?JSON.parse(JSON.stringify(t.reminders)):[];showModal('<h2>Repeat goal</h2><p style="font-size:13px;color:var(--text2);margin-bottom:1rem;line-height:1.5;">Edit anything before starting fresh.</p>'+goalFormHTML(t,true)+'<div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveGoalForm(\''+t.id+'\')">Start fresh</button></div>');renderRemBlocks();}

function showModal(html){document.getElementById('modal-root').innerHTML='<div class="modal-backdrop" onclick="closeModalOutside(event)"><div class="modal">'+html+'</div></div>';}
function closeModal(){document.getElementById('modal-root').innerHTML='';}
function closeModalOutside(e){if(e.target===e.currentTarget)closeModal();}

function subcatOpts(type,sel){return(type==='physical'?PHYSICAL_SUBCATS:CHARACTER_SUBCATS).map(s=>'<option'+(s===sel?' selected':'')+'>'+s+'</option>').join('');}
function remBlockHTML(r,idx){const rep=r.repeat||'Never';return '<div class="reminder-block" id="rb-'+idx+'"><div class="rem-block-hdr"><span class="rem-block-lbl">Reminder '+(idx+1)+'</span><button class="btn-ghost" onclick="removeReminder('+idx+')"><i class="ti ti-x"></i> Remove</button></div><div class="form-group"><label>Time</label><div class="time-row"><input type="text" id="rt-'+idx+'" placeholder="8:00" value="'+(r.time||'8:00')+'"><select id="ra-'+idx+'"><option'+(( r.ampm||'AM')==='AM'?' selected':'')+'>AM</option><option'+((r.ampm||'AM')==='PM'?' selected':'')+'>PM</option></select></div></div><div class="form-group"><label>Repeat</label><select id="rr-'+idx+'" onchange="onRepChg('+idx+')">'+REPEAT_OPTS.map(o=>'<option'+(o===rep?' selected':'')+'>'+o+'</option>').join('')+'</select></div><div id="rwd-'+idx+'" style="'+(rep==='Weekly'?'':'display:none')+'" class="form-group"><label>Remind on days</label><div class="dow-grid">'+DOW_FULL.map((d,i)=>'<label class="dow-chip"><input type="checkbox" class="rdow-'+idx+'" data-dow="'+i+'"'+(r.repeatDays&&r.repeatDays.includes(i)?' checked':'')+'>'+d+'</label>').join('')+'</div></div><div id="rmo-'+idx+'" style="'+(rep==='Monthly / every other week'?'':'display:none')+'" class="form-group"><label>Cadence</label><select id="rmc-'+idx+'"><option value="monthly"'+(r.monthlyCadence==='monthly'?' selected':'')+'>Monthly</option><option value="biweekly"'+(r.monthlyCadence==='biweekly'?' selected':'')+'>Every other week</option></select></div><div id="red-'+idx+'" class="form-group" style="'+(rep!=='Never'?'':'display:none')+'"><label>Stop repeating on (optional)</label><input type="date" id="ren-'+idx+'" value="'+(r.endDate||'')+'"></div></div>';}
function onRepChg(idx){const v=document.getElementById('rr-'+idx).value;document.getElementById('rwd-'+idx).style.display=v==='Weekly'?'':'none';document.getElementById('rmo-'+idx).style.display=v==='Monthly / every other week'?'':'none';document.getElementById('red-'+idx).style.display=v!=='Never'?'':'none';}
function renderRemBlocks(){document.getElementById('rem-blocks').innerHTML=formReminders.map((r,i)=>remBlockHTML(r,i)).join('');}
function addReminder(){formReminders.push({time:'8:00',ampm:'AM',repeat:'Never',repeatDays:[],monthlyCadence:'monthly',endDate:null});renderRemBlocks();}
function removeReminder(idx){formReminders.splice(idx,1);renderRemBlocks();}
function collectRem(){return formReminders.map((_,i)=>({time:(document.getElementById('rt-'+i)||{}).value||'8:00',ampm:(document.getElementById('ra-'+i)||{}).value||'AM',repeat:(document.getElementById('rr-'+i)||{}).value||'Never',repeatDays:[...(document.querySelectorAll('.rdow-'+i+':checked')||[])].map(el=>parseInt(el.dataset.dow)),monthlyCadence:(document.getElementById('rmc-'+i)||{}).value||'monthly',endDate:(document.getElementById('ren-'+i)||{}).value||null}));}

function goalFormHTML(g,isRepeat){
  const type=g?g.type:'physical',freq=g?(g.frequency||'daily'):'daily',unit=g?(g.unit||'dollars ($)'):'dollars ($)',subcat=g?(g.subcat||''):'',tm=g?(g.trackingMode||'progress'):'progress',showProg=g?(g.showProgress!==false):true;
  if(!isRepeat)formReminders=g?(g.reminders?JSON.parse(JSON.stringify(g.reminders)):[]):[];
  return '<div class="form-group"><label>Title</label><input type="text" id="f-title" value="'+(g?g.title:'')+'"></div><div class="form-group"><label>Purpose ŌĆö why does this matter?</label><textarea id="f-purpose">'+(g?g.purpose:'')+'</textarea></div><div class="form-row"><div class="form-group"><label>Type</label><select id="f-type" onchange="ftOnType()"><option value="physical"'+(type==='physical'?' selected':'')+'>Physical</option><option value="character"'+(type==='character'?' selected':'')+'>Character</option></select></div><div class="form-group"><label>Frequency</label><select id="f-freq" onchange="ftOnFreq()"><option value="daily"'+(freq==='daily'?' selected':'')+'>Daily</option><option value="weekly"'+(freq==='weekly'?' selected':'')+'>Weekly</option><option value="longterm"'+(freq==='longterm'?' selected':'')+'>Long-term</option></select></div></div><div class="form-group"><label>Subcategory</label><select id="f-subcat" onchange="ftOnSubcat()">'+subcatOpts(type,subcat)+'</select></div><div id="fsc-custom" class="form-group" style="'+(subcat&&subcat.startsWith('Other')?'':'display:none')+'"><label>Custom subcategory</label><input type="text" id="f-sc-custom" value="'+(g&&g.customSubcat?g.customSubcat:'')+'"></div><div class="form-group"><label>Tracking style</label><select id="f-track" onchange="ftOnTrack()"><option value="progress"'+(tm==='progress'?' selected':'')+'>Progress bar / log</option><option value="checklist"'+(tm==='checklist'?' selected':'')+'>Daily checklist</option></select></div><div id="f-phys" style="'+(type==='physical'&&tm!=='checklist'?'':'display:none')+'"><div class="form-row"><div class="form-group"><label>Target amount</label><input type="number" id="f-target" value="'+(g&&g.target?g.target:'')+'" placeholder="0"></div><div class="form-group"><label>Unit</label><select id="f-unit" onchange="ftOnUnit()">'+UNITS.map(u=>'<option'+(u===unit?' selected':'')+'>'+u+'</option>').join('')+'</select></div></div><div id="f-unit-c" class="form-group" style="'+(unit==='Custom'?'':'display:none')+'"><label>Custom unit name</label><input type="text" id="f-unit-cv" value="'+(g&&g.customUnit?g.customUnit:'')+'"></div><div class="form-group"><label>Current amount</label><input type="number" id="f-current" value="'+(isRepeat?'0':g&&g.current?g.current:'')+'" placeholder="0"></div><div class="toggle-row"><span class="toggle-lbl">Show progress bar</span><label class="toggle"><input type="checkbox" id="f-showprog"'+(showProg?' checked':'')+"><span class='toggle-slider'></span></label></div></div><div id='f-char' style='"+(type==='character'&&tm!=='checklist'?'':'display:none')+"'><div class='toggle-row'><span class='toggle-lbl'>Show progress bar</span><label class='toggle'><input type='checkbox' id='f-showprog-c' onchange='ftOnCharProg()'"+(g&&g.showProgress?' checked':'')+"><span class='toggle-slider'></span></label></div><div id='f-chartgt' class='form-group' style='"+(g&&g.showProgress?'margin-top:8px;':'display:none')+"'><label>Entry goal (entries to reach 100%)</label><input type='number' id='f-char-tgt' value='"+(g&&g.charTarget?g.charTarget:'')+"' placeholder='e.g. 30'></div></div><div id='f-goaldate' class='form-group' style='"+(freq==='longterm'?'':'display:none')+"'><label>Goal date</label><input type='date' id='f-gdate' value='"+(g&&g.goalDate?g.goalDate:'')+"'></div><div id='f-weekdays' style='"+(freq==='weekly'?'':'display:none')+"' class='form-group'><label>Applies on days</label><div class='dow-grid'>"+DOW_FULL.map((d,i)=>'<label class="dow-chip"><input type="checkbox" class="gdow" data-dow="'+i+'"'+(g&&g.reminderDays&&g.reminderDays.includes(i)?' checked':'')+'>'+d+'</label>').join('')+"</div></div><hr class='divider'><div style='font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.5;'>Reminders</div><div id='rem-blocks'></div><button class='btn-add-reminder' onclick='addReminder()'><i class='ti ti-plus'></i> Add reminder</button>";
}
function ftOnType(){const t=document.getElementById('f-type').value,tm=document.getElementById('f-track').value;document.getElementById('f-phys').style.display=t==='physical'&&tm!=='checklist'?'':'none';document.getElementById('f-char').style.display=t==='character'&&tm!=='checklist'?'':'none';document.getElementById('f-subcat').innerHTML=subcatOpts(t,'');document.getElementById('fsc-custom').style.display='none';}
function ftOnTrack(){const tm=document.getElementById('f-track').value,t=document.getElementById('f-type').value;document.getElementById('f-phys').style.display=t==='physical'&&tm!=='checklist'?'':'none';document.getElementById('f-char').style.display=t==='character'&&tm!=='checklist'?'':'none';}
function ftOnFreq(){const f=document.getElementById('f-freq').value;document.getElementById('f-goaldate').style.display=f==='longterm'?'':'none';document.getElementById('f-weekdays').style.display=f==='weekly'?'':'none';}
function ftOnSubcat(){document.getElementById('fsc-custom').style.display=document.getElementById('f-subcat').value.startsWith('Other')?'':'none';}
function ftOnUnit(){document.getElementById('f-unit-c').style.display=document.getElementById('f-unit').value==='Custom'?'':'none';}
function ftOnCharProg(){const c=document.getElementById('f-showprog-c').checked;document.getElementById('f-chartgt').style.cssText=c?'display:block;margin-top:8px;':'display:none;';}
function openNewGoal(){formReminders=[];showModal('<h2>New goal</h2>'+goalFormHTML(null)+'<div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveGoalForm(null)">Add goal</button></div>');renderRemBlocks();}
function openEditGoal(id){const g=goals.find(x=>x.id===id);if(!g)return;showModal('<h2>Edit goal</h2>'+goalFormHTML(g)+'<div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveGoalForm(\''+id+'\')">Save</button></div>');renderRemBlocks();}
async function saveGoalForm(id){
  const title=document.getElementById('f-title').value.trim(),purpose=document.getElementById('f-purpose').value.trim();
  if(!title||!purpose){alert('Please fill in title and purpose.');return;}
  const type=document.getElementById('f-type').value,subcat=document.getElementById('f-subcat').value,freq=document.getElementById('f-freq').value,tm=document.getElementById('f-track').value;
  const isNew=!id;const g=id?goals.find(x=>x.id===id):{id:uid(),_dbid:null,createdAt:today(),streak:0,lastCheckin:null,completed:false,archived:false,completedAt:null,checkins:{}};
  g.title=title;g.purpose=purpose;g.type=type;g.subcat=subcat;g.frequency=freq;g.trackingMode=tm;
  if(subcat.startsWith('Other'))g.customSubcat=(document.getElementById('f-sc-custom')||{}).value||'';
  if(freq==='longterm')g.goalDate=document.getElementById('f-gdate').value||null;
  if(freq==='weekly')g.reminderDays=[...document.querySelectorAll('.gdow:checked')].map(el=>parseInt(el.dataset.dow));
  g.reminders=collectRem();g.reminder=g.reminders.length>0;
  if(type==='physical'&&tm!=='checklist'){g.target=parseFloat(document.getElementById('f-target').value)||0;g.current=parseFloat(document.getElementById('f-current').value)||0;g.unit=document.getElementById('f-unit').value;if(g.unit==='Custom')g.customUnit=(document.getElementById('f-unit-cv')||{}).value||'';if(!g.additions)g.additions=[];g.showProgress=document.getElementById('f-showprog').checked;}
  else if(type==='character'&&tm!=='checklist'){if(!g.entries)g.entries=[];g.showProgress=document.getElementById('f-showprog-c').checked;if(g.showProgress)g.charTarget=parseInt(document.getElementById('f-char-tgt').value)||null;}
  if(isNew)goals.push(g);
  g.icon='ŌÅ│';closeModal();render();
  g.icon=await fetchAIIcon(title,subcat,purpose);
  await saveGoal(g);render();
}

function openAddAmount(id){const g=goals.find(x=>x.id===id);if(!g)return;const ul=g.unit==='Custom'?(g.customUnit||'units'):(g.unit||'dollars ($)');showModal('<h2>Log addition</h2><div class="form-group"><label>Amount ('+ul+')</label><input type="number" id="f-amt" placeholder="0"></div><div class="form-group"><label>Caption</label><input type="text" id="f-cap" placeholder="e.g. Part of paycheck May 10"></div><div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="doAddAmount(\''+id+'\')">Add</button></div>');}
async function doAddAmount(id){const g=goals.find(x=>x.id===id);if(!g)return;const amt=parseFloat(document.getElementById('f-amt').value),cap=document.getElementById('f-cap').value.trim();if(!amt||!cap){alert('Fill in both fields.');return;}g.additions.push({amount:amt,caption:cap,date:today()});g.current=Math.round((g.current+amt)*100)/100;updateStreak(g);await saveGoal(g);closeModal();showRewardPrompt(id);}
function showRewardPrompt(goalId){showModal('<div class="reward-box"><div style="font-size:44px;margin-bottom:10px;">­¤Äē</div><div style="font-size:20px;font-weight:700;margin-bottom:6px;line-height:1.4;">Addition logged!</div><div style="font-size:14px;color:var(--text2);margin-bottom:4px;line-height:1.6;">Nice work. Want to claim your reward?</div><div style="font-size:13px;color:var(--text3);margin-bottom:8px;line-height:1.5;">One run of Flappy Bird ­¤É”</div><div class="reward-actions"><button class="reward-btn no" onclick="closeModal();renderDetailView(\''+goalId+'\')">Ō£Ģ</button><button class="reward-btn yes" onclick="closeModal();startFlappy(\''+goalId+'\')">Ō£ō</button></div></div>');}

function startFlappy(returnGoalId){
  const overlay=document.getElementById('flappy-overlay');
  const W=Math.min(340,window.innerWidth-32),H=Math.min(500,window.innerHeight-100);
  overlay.style.display='flex';
  overlay.innerHTML='<button class="flappy-close" onclick="closeFlappy(\''+returnGoalId+'\')"><i class="ti ti-x"></i></button><canvas id="fc" width="'+W+'" height="'+H+'"></canvas><div id="fui" style="text-align:center;margin-top:12px;"><div style="font-size:15px;color:rgba(255,255,255,0.75);line-height:1.5;">Tap or press Space to flap!</div></div>';
  const canvas=document.getElementById('fc'),ctx=canvas.getContext('2d'),CW=canvas.width,CH=canvas.height;
  let bird={x:CW*0.22,y:CH/2,vy:0,r:14},pipes=[],score=0,frame=0,alive=true,started=false;
  const gravity=0.38,flapStr=-7.2,pipeW=52,gap=CH*0.28,pipeSpeed=2.4;
  function flap(){if(!alive)return;if(!started)started=true;bird.vy=flapStr;}
  canvas.addEventListener('click',flap);
  function onKey(e){if(e.code==='Space'){e.preventDefault();flap();}if(!alive)document.removeEventListener('keydown',onKey);}
  document.addEventListener('keydown',onKey);
  function drawBg(){const sky=ctx.createLinearGradient(0,0,0,CH);sky.addColorStop(0,'#87CEEB');sky.addColorStop(1,'#c9e8f5');ctx.fillStyle=sky;ctx.fillRect(0,0,CW,CH);ctx.fillStyle='#8B6914';ctx.fillRect(0,CH-30,CW,30);ctx.fillStyle='#5a9e2f';ctx.fillRect(0,CH-35,CW,8);}
  function drawPipes(){pipes.forEach(p=>{const g2=ctx.createLinearGradient(p.x,0,p.x+pipeW,0);g2.addColorStop(0,'#3a9e4e');g2.addColorStop(0.5,'#5ccc6b');g2.addColorStop(1,'#3a9e4e');ctx.fillStyle=g2;ctx.fillRect(p.x,0,pipeW,p.topH);ctx.fillStyle='#2d7a3b';ctx.fillRect(p.x-4,p.topH-14,pipeW+8,14);ctx.fillStyle=g2;const by=p.topH+gap;ctx.fillRect(p.x,by,pipeW,CH-by);ctx.fillStyle='#2d7a3b';ctx.fillRect(p.x-4,by,pipeW+8,14);});}
  function drawBird(){ctx.save();ctx.translate(bird.x,bird.y);ctx.rotate(Math.max(-0.4,Math.min(0.4,bird.vy*0.06)));ctx.fillStyle='#f5d020';ctx.beginPath();ctx.arc(0,0,bird.r,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(5,-4,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#222';ctx.beginPath();ctx.arc(6,-4,2.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#f0a500';ctx.beginPath();ctx.ellipse(-4,3,9,5,started?Math.sin(frame*0.3)*0.5:0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#e05c00';ctx.beginPath();ctx.moveTo(bird.r-2,-2);ctx.lineTo(bird.r+8,0);ctx.lineTo(bird.r-2,4);ctx.closePath();ctx.fill();ctx.restore();}
  function drawScore(){ctx.fillStyle='rgba(0,0,0,0.3)';ctx.font='bold 32px sans-serif';ctx.textAlign='center';ctx.fillText(score,CW/2+2,52);ctx.fillStyle='#fff';ctx.fillText(score,CW/2,50);}
  function hit(){if(bird.y+bird.r>CH-35||bird.y-bird.r<0)return true;for(const p of pipes){if(bird.x+bird.r>p.x+4&&bird.x-bird.r<p.x+pipeW-4){if(bird.y-bird.r<p.topH||bird.y+bird.r>p.topH+gap)return true;}}return false;}
  let raf;
  function loop(){frame++;ctx.clearRect(0,0,CW,CH);drawBg();if(started){bird.vy+=gravity;bird.y+=bird.vy;if(frame%80===0){const minH=60,maxH=CH-gap-60;pipes.push({x:CW,topH:minH+Math.random()*(maxH-minH)});}pipes=pipes.filter(p=>p.x+pipeW>0);pipes.forEach(p=>{if(!p.passed&&p.x+pipeW<bird.x){p.passed=true;score++;}p.x-=pipeSpeed;});if(hit()){alive=false;showDeath();return;}}else{bird.y=CH/2+Math.sin(frame*0.05)*12;}drawPipes();drawBird();drawScore();raf=requestAnimationFrame(loop);}
  loop();
  function showDeath(){cancelAnimationFrame(raf);ctx.clearRect(0,0,CW,CH);drawBg();drawPipes();drawBird();ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fillRect(0,0,CW,CH);ctx.fillStyle='#fff';ctx.font='bold 26px sans-serif';ctx.textAlign='center';ctx.fillText('Game over!',CW/2,CH/2-28);ctx.font='bold 46px sans-serif';ctx.fillStyle='#f5d020';ctx.fillText(score,CW/2,CH/2+20);ctx.font='15px sans-serif';ctx.fillStyle='rgba(255,255,255,0.7)';ctx.fillText('Score: '+score,CW/2,CH/2+50);document.getElementById('fui').innerHTML='<div style="color:rgba(255,255,255,0.7);font-size:14px;margin-bottom:12px;line-height:1.5;">Not bad! Back to crushing your goals ­¤Æ¬</div><button class="btn btn-primary" onclick="closeFlappy(\''+returnGoalId+'\')">Done</button>';}
}
function closeFlappy(returnGoalId){document.getElementById('flappy-overlay').style.display='none';document.getElementById('flappy-overlay').innerHTML='';if(returnGoalId)renderDetailView(returnGoalId);}

function openAddSummary(id){showModal('<h2>Today\'s summary</h2><div class="form-group"><label>How did you live out this goal today?</label><textarea id="f-sum" style="min-height:90px;" placeholder="Write a brief reflection..."></textarea></div><div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="doAddSummary(\''+id+'\')">Save</button></div>');}
async function doAddSummary(id){const g=goals.find(x=>x.id===id);if(!g)return;const txt=document.getElementById('f-sum').value.trim();if(!txt){alert('Write something first.');return;}if(!g.entries)g.entries=[];g.entries.push({text:txt,date:today()});updateStreak(g);await saveGoal(g);closeModal();renderDetailView(id);}
</script>
